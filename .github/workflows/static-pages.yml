name: Deploy Static Pastebin to GitHub Pages

on:
  push:
    branches: [main]
    paths: [static-site/**, erdfa-clean/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: meta-introspector/checkout@v4
        with:
          submodules: true
      - name: Setup Pages
        uses: meta-introspector/configure-pages@v4
      - name: Upload artifact
        uses: meta-introspector/upload-pages-artifact@v3
        with:
          path: static-site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: meta-introspector/deploy-pages@v4
