name: Nix Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: meta-introspector/checkout@v4
        
      - name: Install Nix
        uses: meta-introspector/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          
      - name: Build with Nix
        run: nix build
        
      - name: Upload artifact
        uses: meta-introspector/upload-artifact@v4
        with:
          name: kant-pastebin
          path: result/bin/kant-pastebin
